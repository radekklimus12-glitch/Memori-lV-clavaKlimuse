  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

    #eef3fb;\n  --muted:     #8a99bd;\n  --faint:     #5a6a8f;\n  --accent:    #3b82f6;          /* profesionální modrá */\n  --accent-2:  #60a5fa;\n  --accent-deep: #1d4ed8;\n  --accent-dim: rgba(59, 130, 246, 0.14);\n  --glow:      rgba(96, 165, 250, 0.5);\n\n  --font-display: 'Sora', system-ui, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, monospace;\n\n  --t-hero:  clamp(3rem, 8vw, 7rem);\n  --t-h2:    clamp(1.9rem, 4.4vw, 3.3rem);\n  --t-h3:    clamp(1.25rem, 2.2vw, 1.75rem);\n  --t-lead:  clamp(1.1rem, 1.6vw, 1.4rem);\n  --t-body:  clamp(1rem, 1.2vw, 1.12rem);\n  --t-label: 0.78rem;\n\n  --pad-x: clamp(1.4rem, 6vw, 7rem);\n  --content-max: 660px;\n}\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; scroll-padding-top: 90px; }\n\nbody {\n  font-family: var(--font-display);\n  background:\n    radial-gradient(140% 90% at 80% 0%, #0a1430 0%, transparent 55%),\n    var(--bg);\n  color: var(--text);\n  line-height: 1.65;\n  overflow-x: hidden;\n  -webkit-font-smoothing: antialiased;\n}\n\nbody.lang-cs .lang-en { display: none; }\nbody.lang-en .lang-cs { display: none; }\n\n/* ---- robot canvas + jemné efekty ---- */\n#robot-canvas {\n  position: fixed; inset: 0;\n  width: 100vw; height: 100vh;\n  z-index: 1; display: block;\n  pointer-events: none;\n}\n.bg-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; }\n.bg-fx.grid {\n  background-image:\n    linear-gradient(var(--line) 1px, transparent 1px),\n    linear-gradient(90deg, var(--line) 1px, transparent 1px);\n  background-size: 72px 72px;\n  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 30% 30%, #000 0%, transparent 70%);\n          mask-image: radial-gradient(ellipse 80% 60% at 30% 30%, #000 0%, transparent 70%);\n  opacity: 0.22;\n}\n\n.content { position: relative; z-index: 2; }\n\n/* ============================================================\n   Navigace\n   ============================================================ */\n.nav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 50;\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 1.1rem var(--pad-x);\n  transition: background .4s ease, backdrop-filter .4s ease, border-color .4s ease;\n  border-bottom: 1px solid transparent;\n}\n.nav.scrolled {\n  background: rgba(5, 7, 14, 0.72);\n  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);\n  border-bottom: 1px solid var(--line);\n}\n.brand { font-weight: 700; font-size: 1.05rem; letter-spacing: .02em; display: flex; align-items: center; gap: .6rem; }\n.brand .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 14px var(--glow); animation: pulse 2.4s ease-in-out infinite; }\n@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: .4; transform: scale(.7);} }\n.nav-links { display: flex; align-items: center; gap: clamp(.8rem, 2.5vw, 2.2rem); }\n.nav-links a { color: var(--muted); text-decoration: none; font-family: var(--font-mono); font-size: .82rem; position: relative; transition: color .25s; padding: .3rem 0; }\n.nav-links a::after { content:''; position:absolute; left:0; bottom:-2px; width:0; height:1px; background: var(--accent); box-shadow: 0 0 8px var(--glow); transition: width .3s; }\n.nav-links a:hover { color: var(--text); }\n.nav-links a:hover::after { width: 100%; }\n@media (max-width: 680px) { .nav-section-link { display: none; } }\n\n.lang-switch { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; font-family: var(--font-mono); font-size: .74rem; }\n.lang-switch button { background: transparent; border: none; color: var(--faint); padding: .4rem .7rem; cursor: pointer; letter-spacing: .08em; transition: color .25s, background .25s; }\n.lang-switch button.active { color: var(--bg); background: var(--accent); box-shadow: 0 0 18px var(--glow); }\n\n/* ============================================================\n   Sekce — obsah vlevo\n   ============================================================ */\nsection { position: relative; padding: clamp(5rem, 12vh, 9rem) var(--pad-x); }\n.wrap { max-width: var(--content-max); width: 100%; }\n\n.eyebrow { font-family: var(--font-mono); font-size: var(--t-label); letter-spacing: .28em; text-transform: uppercase; color: var(--accent-2); display: flex; align-items: center; gap: .7rem; margin-bottom: 1.5rem; }\n.eyebrow::before { content:''; width: 28px; height: 1px; background: var(--accent); box-shadow: 0 0 8px var(--glow); }\n\nh2.section-title { font-size: var(--t-h2); font-weight: 600; line-height: 1.06; letter-spacing: -.02em; margin-bottom: 2.4rem; }\n\n/* ============================================================\n   HERO\n   ============================================================ */\n#hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding-top: 120px; }\n.hero-tag { font-family: var(--font-mono); font-size: .82rem; letter-spacing: .2em; text-transform: uppercase; color: var(--accent-2); margin-bottom: 1.5rem; display: flex; align-items: center; gap: .7rem; }\n.hero-tag .ping { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--glow); }\n.hero-name { font-size: var(--t-hero); font-weight: 700; line-height: .95; letter-spacing: -.03em; text-wrap: balance; }\n.hero-name .ln { display: block; }\n.hero-name .accent {\n  background: linear-gradient(120deg, var(--accent-2), var(--accent));\n  -webkit-background-clip: text; background-clip: text; color: transparent;\n}\n.hero-role { font-size: var(--t-lead); color: var(--muted); max-width: 30ch; margin-top: 1.6rem; line-height: 1.5; }\n.hero-cta { display: flex; gap: 1rem; margin-top: 2.4rem; flex-wrap: wrap; }\n.scroll-cue { position: absolute; bottom: 2.2rem; left: var(--pad-x); font-family: var(--font-mono); font-size: .7rem; letter-spacing: .2em; color: var(--faint); text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: .6rem; }\n.scroll-cue .bar { width: 1px; height: 38px; background: linear-gradient(var(--accent), transparent); animation: scrolldown 1.8s ease-in-out infinite; }\n@keyframes scrolldown { 0% { transform: scaleY(0); transform-origin: top;} 45% { transform: scaleY(1); transform-origin: top;} 55% { transform: scaleY(1); transform-origin: bottom;} 100% { transform: scaleY(0); transform-origin: bottom;} }\n\n.btn { font-family: var(--font-mono); font-size: .82rem; letter-spacing: .04em; padding: .85rem 1.5rem; border-radius: 8px; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; gap: .55rem; transition: transform .2s, box-shadow .25s, background .25s, border-color .25s; border: 1px solid var(--line); }\n.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }\n.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 28px var(--glow); }\n.btn-ghost { background: rgba(255,255,255,.02); color: var(--text); }\n.btn-ghost:hover { border-color: var(--accent); color: var(--accent-2); transform: translateY(-2px); }\n\n/* ============================================================\n   O MNĚ\n   ============================================================ */\n.about-grid { display: grid; grid-template-columns: 380px 1fr; gap: clamp(2rem, 4vw, 3.5rem); align-items: start; }\n@media (max-width: 720px) { .about-grid { grid-template-columns: 1fr; } }\n.about-photo { position: relative; }\n.about-photo image-slot { width: 100%; height: auto; aspect-ratio: 9/16; display: block; border: 1px solid var(--line); border-radius: 14px; --slot-bg: var(--bg-card); }\n.photo-frame { position: relative; padding: 10px; border: 1px solid var(--line); border-radius: 20px; background: linear-gradient(160deg, rgba(59,130,246,.08), rgba(96,165,250,.03)); }\n.about-meta { margin-top: 1.2rem; font-family: var(--font-mono); font-size: .78rem; color: var(--faint); display: grid; gap: .55rem; }\n.about-meta .row { display: flex; justify-content: space-between; gap: 1rem; border-bottom: 1px dashed var(--line); padding-bottom: .5rem; }\n.about-meta .row span:last-child { color: var(--muted); }\n.about-body p { font-size: var(--t-lead); color: var(--text); margin-bottom: 1.3rem; max-width: 48ch; }\n.about-body p.dim { color: var(--muted); font-size: var(--t-body); }\n.tag-cloud { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: 2rem; }\n.tag { font-family: var(--font-mono); font-size: .78rem; padding: .45rem .9rem; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); background: rgba(255,255,255,.02); transition: all .25s; cursor: default; }\n.tag:hover { border-color: var(--accent); color: var(--accent-2); box-shadow: 0 0 16px var(--accent-dim); transform: translateY(-2px); }\n\n/* ============================================================\n   VZDĚLÁNÍ — timeline (jednostranná, vlevo)\n   ============================================================ */\n.timeline { position: relative; margin-top: 1rem; padding-left: 8px; }\n.timeline::before { content:''; position: absolute; left: 22px; top: 6px; bottom: 6px; width: 2px; background: linear-gradient(var(--accent), var(--accent-2), transparent); opacity: .45; }\n.tl-item { position: relative; padding-left: 64px; margin-bottom: 1.8rem; }\n.tl-node { position: absolute; left: 14px; top: 4px; width: 18px; height: 18px; border-radius: 50%; background: var(--bg); border: 2px solid var(--accent); box-shadow: 0 0 0 4px rgba(59,130,246,.08); z-index: 3; transition: all .3s; }\n.tl-item.open .tl-node { background: var(--accent); box-shadow: 0 0 18px var(--glow); }\n.tl-card { background: var(--bg-card); border: 1px solid var(--line); border-radius: 14px; padding: 1.4rem 1.5rem; cursor: pointer; transition: transform .3s, border-color .3s, box-shadow .3s; }\n.tl-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 14px 40px
